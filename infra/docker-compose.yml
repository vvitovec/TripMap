services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: tripmap
      POSTGRES_USER: tripmap
      POSTGRES_PASSWORD: tripmap
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripmap -d tripmap"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tripmap
      MINIO_ROOT_PASSWORD: tripmap-secret
    volumes:
      - minio-data:/data
    ports:
      - "9007:9000"
      - "9008:9001"

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      NODE_ENV: production
      API_PORT: 8328
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8327}
      JWT_SECRET: ${JWT_SECRET:-tripmap-change-me}
      DATABASE_URL: postgres://tripmap:tripmap@postgres:5432/tripmap
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9007}
      S3_REGION: us-east-1
      S3_BUCKET: tripmap-media
      S3_ACCESS_KEY: tripmap
      S3_SECRET_KEY: tripmap-secret
    ports:
      - "8328:8328"

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://tripmap:tripmap@postgres:5432/tripmap
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: tripmap-media
      S3_ACCESS_KEY: tripmap
      S3_SECRET_KEY: tripmap-secret

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
      args:
        VITE_API_BASE: /api
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-8327}:80"

volumes:
  postgres-data:
  redis-data:
  minio-data:
